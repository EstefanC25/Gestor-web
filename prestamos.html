<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamo de Iluminación</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #26599c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #1f3c88;
            font-size: 18px;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        label {
            display: block;
            margin-top: 16px;
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 11px 13px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #dde3ee;
            font-size: 14px;
            font-family: "Segoe UI", sans-serif;
            color: #222;
            background: #f7f9fc;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79,172,254,0.15);
            background: #fff;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 13px;
            background: linear-gradient(135deg, #4facfe, #1f3c88);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.92; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .msg.ok { background: #e8f5e9; color: #2e7d32; display: block; }
        .msg.err { background: #ffebee; color: #c62828; display: block; }

        .volver {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #4facfe;
            text-decoration: none;
            font-weight: 600;
        }
        .volver:hover { text-decoration: underline; }
    

    </style>
</head>
<body>

<div class="container">
    <h2>Préstamo de Iluminación</h2>

    <form id="form">
        <label>1. Técnico</label>
        <input type="text" id="tecnico" placeholder="Nombre del técnico" required>

        <label>2. Edificio</label>
        <input type="text" id="edificio" placeholder="Nombre del edificio" required>

        <label>3. NIE</label>
        <input type="text" id="nie" placeholder="NIE" required>

        <label>4. Tipo de Iluminación</label>
        <select id="tipo" required>
            <option value="">— Seleccionar —</option>
            <option>Lámpara LED 4w</option>
            <option>Lámpara LED 9w</option>
            <option>Lámpara LED 3.5 / 5w</option>
            <option>Tubo LED T8 9w</option>
            <option>Tubo LED T8 18w</option>
        </select>

        <label>5. Cantidad</label>
        <input type="number" id="cantidad" placeholder="Cantidad" min="1" required>

        <button type="submit" id="btnEnviar">Enviar préstamo</button>
    </form>

    <div class="msg" id="msg"></div>
    <a class="volver" href="index.html">← Volver al inicio</a>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxaAWRHqGQ3VRH0uMQY6JxgXlCaeNzGWcDytUuT0ydzz4dIXaZo742ILmwHNnIqPCOAGQ/exec";

    document.getElementById("form").addEventListener("submit", function(e) {
        e.preventDefault();

        const btn = document.getElementById("btnEnviar");
        const msg = document.getElementById("msg");

        btn.disabled = true;
        btn.textContent = "Enviando...";
        msg.className = "msg";

        const datos = {
            TECNICO:   document.getElementById("tecnico").value.trim(),
            EDIFICIO:  document.getElementById("edificio").value.trim(),
            NIE:       document.getElementById("nie").value.trim(),
            TIPO:      document.getElementById("tipo").value,
            CANTIDAD:  document.getElementById("cantidad").value
        };

        fetch(URL_SCRIPT, {
            method: "POST",
            body: JSON.stringify(datos)
        })
        .then(res => res.json())
        .then(r => {
            if (r.result === "ok") {
                msg.className = "msg ok";
                msg.textContent = "✅ Préstamo registrado correctamente.";
                document.getElementById("form").reset();
            } else {
                throw new Error();
            }
        })
        .catch(() => {
            msg.className = "msg err";
            msg.textContent = "❌ Error al enviar. Intenta de nuevo.";
        })
        .finally(() => {
            btn.disabled = false;
            btn.textContent = "Enviar préstamo";
        });
    });
</script>

</body>
</html>
