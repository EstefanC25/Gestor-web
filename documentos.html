<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Documentos</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body class="documentos">

    <img src="img/gestion.png" alt="Imagen de fondo" class="fondo">

    <header>
        <h1>Archivos PDF</h1>
        <p>
            En este espacio encontrará documentos técnicos, manuales y formularios
            que puede visualizar o descargar según sus necesidades.
        </p>
    </header>

    <main class="contenido">

        <!-- ORDENES -->
        <section class="card">
            <div class="label-contenedor">
                <img src="img/doc1.png" alt="Ícono orden" class="icono">
                <label for="ordenSelect">ÓRDENES MES DE ENERO</label>
            </div>

            <select id="ordenSelect">
                <option value="">-- Seleccione un archivo --</option>
                <option value="docs/BOGTR_32.pdf">BOGTR 32</option>
                <option value="docs/BOGTR_33.pdf">BOGTR 33</option>
                <option value="docs/BOGTR_34.pdf">BOGTR 34</option>
            </select>

            <button onclick="abrirPDF('ordenSelect')">Abrir PDF</button>
        </section>

        <!-- LECCIONES -->
        <section class="card">
            <div class="label-contenedor">
                <img src="img/list.jpg" alt="Ícono orden" class="icono">
                <label for="pdfSelect">LECCIONES APRENDIDAS</label>
            </div>

            <select id="pdfSelect">
                <option value="">-- Seleccione un archivo --</option>
                <option value="docs2/124.pdf">Lección Aprendida 124</option>
                <option value="docs2/146.pdf">Lección Aprendida 146</option>
                <option value="docs2/148.pdf">Lección Aprendida 148</option>
            </select>

            <button onclick="abrirPDF('pdfSelect')">Abrir PDF</button>
        </section>

    </main>

    <script>
        function abrirPDF(selectid) {
            const selector = document.getElementById(selectid);
            const archivo = selector.value;

            if (archivo) {
                window.open(archivo, "_blank");
            } else {
                alert("Por favor, selecciona un documento.");
            }
        }
    </script>

</body>
</html>
