<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros - Material Técnico</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #26599c);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1f3c88;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            padding: 9px 14px;
            font-size: 13px;
            font-family: "Segoe UI", sans-serif;
            border: 1px solid #dde3ee;
            border-radius: 8px;
            background: #f7f9fc;
            color: #222;
            outline: none;
            width: 220px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-box:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79,172,254,0.15);
            background: #fff;
        }

        .btn-refresh {
            padding: 9px 16px;
            font-size: 13px;
            font-family: "Segoe UI", sans-serif;
            font-weight: 600;
            color: #1f3c88;
            background: #e3f2fd;
            border: 1px solid #b5d4f4;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-refresh:hover { background: #cce4f7; }
        .btn-refresh:active { transform: scale(0.97); }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid #dde3ee;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead tr {
            background: #f7f9fc;
        }

        th {
            padding: 11px 14px;
            text-align: left;
            font-size: 15px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid #dde3ee;
            white-space: nowrap;
        }

        td {
            padding: 11px 14px;
            border-bottom: 1px solid #f0f3fa;
            color: #222;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f7f9fc; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: #e3f2fd;
            color: #1f3c88;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .total {
            font-size: 12px;
            color: #888;
        }

        .volver {
            font-size: 12px;
            color: #4facfe;
            text-decoration: none;
            font-weight: 600;
        }

        .volver:hover { text-decoration: underline; }

        /* Estados */
        .estado {
            text-align: center;
            padding: 2.5rem;
            font-size: 14px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #dde3ee;
            border-top-color: #4facfe;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error { color: #e24b4a; }
        .empty { color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>REGISTROS DE INGRESO ALMACEN</h2>
        <div class="controls">
            <input class="search-box" type="text" id="buscar" placeholder="Buscar registros...">
            <button class="btn-refresh" onclick="cargarDatos()">↻ Actualizar</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Edificio</th>
                    <th>NIE</th>
                    <th>Ruta</th>
                    <th>Orden</th>
                    <th>Pedido</th>
                    <th>Materiales</th>
                </tr>
            </thead>
            <tbody id="cuerpo">
                <tr>
                    <td colspan="6" class="estado">
                        <span class="spinner"></span> Cargando registros...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <span class="total" id="total"></span>
        <a class="volver" href="index.html">← Volver al formulario</a>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyn0dylC1UIXGYD62hahowOJ_mbRfT3-QxMcVs_-nEqRx5SO-hng0CcjTAtFpsBK5TSug/exec";

    let todosLosDatos = [];

    function cargarDatos() {
        const cuerpo = document.getElementById("cuerpo");
        cuerpo.innerHTML = `<tr><td colspan="6" class="estado"><span class="spinner"></span> Cargando registros...</td></tr>`;
        document.getElementById("total").textContent = "";

        fetch(URL_SCRIPT)
            .then(res => res.json())
            .then(datos => {
                todosLosDatos = datos;
                renderizar(datos);
            })
            .catch(() => {
                cuerpo.innerHTML = `<tr><td colspan="6" class="estado error">❌ Error al cargar los datos. Verifica que el Apps Script esté publicado correctamente.</td></tr>`;
            });
    }

    function renderizar(lista) {
        const cuerpo = document.getElementById("cuerpo");
        const totalEl = document.getElementById("total");

        if (lista.length === 0) {
            cuerpo.innerHTML = `<tr><td colspan="6" class="estado empty">No se encontraron registros.</td></tr>`;
            totalEl.textContent = "";
            return;
        }

        cuerpo.innerHTML = lista.map(r => `
            <tr>
                <td title="${r.EDIFICIO || ''}">${r.EDIFICIO || "—"}</td>
                <td>${r.NIE || "—"}</td>
                <td><span class="badge">${r.RUTA || "—"}</span></td>
                <td>${r.ORDEN || "—"}</td>
                <td>${r.PEDIDO || "—"}</td>
                <td title="${r.MATERIAL || ''}">${r.MATERIAL || "—"}</td>
            </tr>
        `).join("");

        totalEl.textContent = `${lista.length} registro${lista.length !== 1 ? "s" : ""} encontrado${lista.length !== 1 ? "s" : ""}`;
    }

    document.getElementById("buscar").addEventListener("input", function () {
        const q = this.value.toLowerCase();
        const filtrado = todosLosDatos.filter(r =>
            Object.values(r).some(v => String(v).toLowerCase().includes(q))
        );
        renderizar(filtrado);
    });

    cargarDatos();
</script>

</body>
</html>
